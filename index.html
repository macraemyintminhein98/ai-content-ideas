<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Content Idea Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-3xl font-bold text-center mb-6">AI Content Ideas</h1>
        <p class="text-center text-gray-600 mb-6">Get unique, SEO-friendly content ideas in seconds!</p>
        <input type="text" id="keywordInput" placeholder="Enter your keyword/topic" class="w-full p-3 border border-gray-300 rounded mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <button id="generateButton" class="w-full bg-blue-600 text-white p-3 rounded hover:bg-blue-700 transition-colors duration-200">Generate Ideas</button>
        <div id="loadingSpinner" class="hidden text-center mt-4">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500 mx-auto"></div>
            <p class="text-gray-500 text-sm mt-2">Generating...</p>
        </div>
        <div id="results" class="mt-6">
            <h2 id="resultsHeader" class="text-xl font-semibold mb-3 hidden">Your Content Ideas:</h2>
            <ul id="ideaList" class="list-disc list-inside space-y-2 text-gray-800">
                <!-- Ideas will be inserted here -->
            </ul>
        </div>
    </div>
    <script>
        const keywordInput = document.getElementById('keywordInput');
        const generateButton = document.getElementById('generateButton');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const results = document.getElementById('results');
        const resultsHeader = document.getElementById('resultsHeader');
        const ideaList = document.getElementById('ideaList');

        generateButton.addEventListener('click', async () => {
            const keyword = keywordInput.value.trim();
            if (!keyword) {
                alert('Please enter a keyword or topic.');
                return;
            }

            generateButton.disabled = true;
            loadingSpinner.classList.remove('hidden');
            ideaList.innerHTML = '';
            resultsHeader.classList.add('hidden');

            try {
                // In a real Vercel deployment, this would call a serverless function
                // For this mock, we simulate an API call
                const response = await fetch('/api/generate-ideas', { // Placeholder API call
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ keyword })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();

                if (data.ideas && data.ideas.length > 0) {
                    resultsHeader.classList.remove('hidden');
                    data.ideas.forEach(idea => {
                        const li = document.createElement('li');
                        li.textContent = idea;
                        ideaList.appendChild(li);
                    });
                } else {
                    ideaList.innerHTML = '<li class="text-gray-500">No ideas generated. Try a different keyword!</li>';
                }
            } catch (error) {
                console.error('Error generating ideas:', error);
                ideaList.innerHTML = '<li class="text-red-500">Failed to generate ideas. Please try again later.</li>';
            } finally {
                generateButton.disabled = false;
                loadingSpinner.classList.add('hidden');
            }
        });

        // Mock API endpoint for demonstration on Vercel dev. Replace with actual logic.
        // Vercel serverless function would handle /api/generate-ideas
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
             // Mocking the fetch call for local development to avoid 404s
            window.fetch = async (url, options) => {
                if (url === '/api/generate-ideas') {
                    return new Promise(resolve => {
                        setTimeout(() => {
                            const { keyword } = JSON.parse(options.body);
                            const ideas = [
                                `How to Master ${keyword} in 5 Easy Steps`,
                                `The Ultimate Guide to ${keyword} (2024 Edition)`,
                                `10 Common Mistakes People Make with ${keyword}`,
                                `Interview: Experts Share Their Secrets on ${keyword}`,
                                `Beyond Basics: Advanced Techniques for ${keyword}`
                            ];
                            resolve(new Response(JSON.stringify({ ideas }), { status: 200, headers: {'Content-Type': 'application/json'} }));
                        }, 1500);
                    });
                }
                return originalFetch(url, options);
            };
            const originalFetch = window.fetch;
        }
    </script>
</body>
</html>

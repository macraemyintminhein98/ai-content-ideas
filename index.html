<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI Content Ideas</title><link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"></head><body class="bg-gray-100 flex items-center justify-center min-h-screen"><div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md"><h1 class="text-2xl font-bold mb-6 text-center">💡 AI Content Ideas</h1><input type="text" id="keywordInput" placeholder="Enter a keyword (e.g., 'sustainable living')" class="w-full p-3 border border-gray-300 rounded mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500"><button id="generateButton" class="w-full bg-blue-600 text-white p-3 rounded hover:bg-blue-700 transition-colors duration-200">Generate Ideas</button><div id="ideasOutput" class="mt-6 p-4 bg-gray-50 border border-gray-200 rounded min-h-[150px] text-gray-700"></div></div><script>async function generateIdeas() {const keyword = document.getElementById('keywordInput').value;const outputDiv = document.getElementById('ideasOutput');outputDiv.innerHTML = '<p class="text-gray-500">Generating ideas...</p>';try {const response = await fetch('/api/generate', {method: 'POST',headers: {'Content-Type': 'application/json'},body: JSON.stringify({ keyword })});const data = await response.json();if (response.ok) {outputDiv.innerHTML = data.ideas.map(idea => `<p class="mb-2">- ${idea}</p>`).join('');} else {outputDiv.innerHTML = `<p class="text-red-500">Error: ${data.error}</p>`;}} catch (error) {outputDiv.innerHTML = `<p class="text-red-500">Network error or server unavailable.</p>`;}}document.getElementById('generateButton').addEventListener('click', generateIdeas);</script></body></html>

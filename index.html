<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sustainable Hiking Content AI</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 0 20px; text-align: center; background-color: #f4f4f4; }
        h1 { color: #333; }
        p { color: #555; }
        input[type="text"] { width: calc(100% - 22px); padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { background-color: #4CAF50; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #45a049; }
        #results { margin-top: 20px; padding: 15px; background-color: #fff; border: 1px solid #eee; border-radius: 4px; text-align: left; min-height: 100px; }
        .loading { display: none; margin-top: 10px; font-style: italic; color: #777; }
    </style>
</head>
<body>
    <h1>Sustainable Hiking Content AI ⛰️</h1>
    <p>Generate fresh content ideas for your sustainable hiking blog or social media.</p>
    <input type="text" id="keywordInput" placeholder="e.g., 'zero-waste camping', 'leave no trace tips'">
    <button onclick="generateIdeas()">Generate Ideas</button>
    <div class="loading" id="loadingIndicator">Generating ideas, please wait...</div>
    <div id="results"></div>

    <script>
        async function generateIdeas() {
            const keyword = document.getElementById('keywordInput').value;
            const resultsDiv = document.getElementById('results');
            const loadingIndicator = document.getElementById('loadingIndicator');
            resultsDiv.innerHTML = '';
            loadingIndicator.style.display = 'block';

            try {
                // In a real app, this would call your backend API
                // For demonstration, simulating an API call
                const response = await new Promise(resolve => setTimeout(() => {
                    const mockIdeas = [
                        `Blog Post: 5 Essential Zero-Waste Gear Swaps for Backpackers`,
                        `Social Media Reel: Top 3 Leave No Trace Principles for Day Hikes`,
                        `Video Script: DIY Sustainable Trail Snacks: Recipes & Storage`,
                        `Article: How to Choose Eco-Friendly Hiking Boots That Last`,
                        `Infographic: Your Guide to Responsible Wild Camping`
                    ];
                    resolve({ ideas: mockIdeas });
                }, 2000));
                
                resultsDiv.innerHTML = '<h2>Your Content Ideas:</h2>' + response.ideas.map(idea => `<p>• ${idea}</p>`).join('');
            } catch (error) {
                resultsDiv.innerHTML = '<p style="color: red;">Error generating ideas. Please try again.</p>';
                console.error('Error:', error);
            } finally {
                loadingIndicator.style.display = 'none';
            }
        }
    </script>
</body>
</html>

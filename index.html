<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI Content Ideas - Generate Creative Concepts</title><link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"></head><body class="bg-gray-100 flex items-center justify-center min-h-screen"><div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full text-center"><h1 class="text-3xl font-bold mb-6 text-gray-800">AI Content Ideas</h1><p class="text-gray-600 mb-6">Generate unique content ideas for your niche instantly.</p><input type="text" id="keywordInput" class="w-full p-3 border border-gray-300 rounded-md mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter your keyword or niche..."><button id="generateBtn" class="bg-blue-600 text-white py-3 px-6 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 transition duration-300">Generate Ideas</button><div id="results" class="mt-6 text-left space-y-3"></div><p class="text-sm text-gray-500 mt-8">One-time purchase: $9.99</p></div><script>document.getElementById('generateBtn').addEventListener('click', async () => {const keyword = document.getElementById('keywordInput').value;const resultsDiv = document.getElementById('results');resultsDiv.innerHTML = '<p class="text-gray-500">Generating ideas...</p>';try {const response = await fetch('/api/generate-ideas', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ keyword }) });const data = await response.json();if (response.ok) {resultsDiv.innerHTML = data.ideas.map(idea => `<p class="bg-gray-50 p-2 rounded-md border border-gray-200">${idea}</p>`).join('');} else {resultsDiv.innerHTML = `<p class="text-red-500">Error: ${data.error}</p>`;}} catch (error) {resultsDiv.innerHTML = '<p class="text-red-500">An unexpected error occurred.</p>';}});</script></body></html>
